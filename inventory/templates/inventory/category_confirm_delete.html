{% extends 'inventory/base.html' %}
{% block title %}Delete Category{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>Delete "{{ object.name }}"?</h2>
    <p class="lead">Are you sure you want to delete this category? This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'category_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
